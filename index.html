<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gear</title>
<style>
  :root{
    --bg:#000;
    --fg:#fff;
    --dim:rgba(255,255,255,.64);
    --faint:rgba(255,255,255,.32);
    --est:#ff6b6b;
    --rule-heavy:rgba(217,217,217,.32);
    --rule-mid:rgba(217,217,217,.16);
    --rule-thin:rgba(217,217,217,.08);
    --pad:16px;
    --maxw:412px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);}
  body{
    color:var(--fg);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--pad) 64px;}

  /* ---- top bar ---- */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:14px 0 0;
    border-bottom:1px solid var(--rule-thin);
  }
  .tabs{display:flex;gap:24px;}
  .tab{
    appearance:none;background:none;border:none;cursor:pointer;
    font-family:inherit;font-size:16px;font-weight:500;letter-spacing:.2px;
    color:var(--faint);
    padding:0 0 12px;margin-bottom:-1px;
    border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--fg);border-bottom-color:var(--fg);}
  .tab:focus-visible{outline:2px solid #fff;outline-offset:3px;border-radius:2px;}

  /* unit toggle */
  .units{display:flex;gap:4px;padding-bottom:9px;}
  .unit{
    appearance:none;border:none;cursor:pointer;font-family:inherit;
    font-size:12px;font-weight:400;color:var(--dim);
    background:rgba(255,255,255,.06);
    height:16px;padding:0 9px;border-radius:8px;
    display:flex;align-items:center;
  }
  .unit.active{background:#fff;color:#000;}
  .unit:focus-visible{outline:2px solid #fff;outline-offset:2px;}

  /* ---- 4 summary boxes ---- */
  .boxes{display:flex;gap:4px;padding:16px 0 18px;}
  .box{
    flex:1;min-width:0;
    background:rgba(255,255,255,.06);
    border-radius:16px;padding:11px 12px;height:55px;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .box .v{font-size:16px;font-weight:500;white-space:nowrap;letter-spacing:-.1px;}
  .box .k{font-size:11px;color:var(--dim);white-space:nowrap;}

  /* ---- category ---- */
  .cat{border-top:4px solid var(--rule-heavy);}
  .cat-head{
    display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:12px 0;
  }
  .cat-head .name{font-size:17px;font-weight:500}
  .cat-head .total{font-size:15px;font-weight:400;color:var(--dim);white-space:nowrap}
  .cat-rule{height:2px;background:var(--rule-mid)}

  /* ---- item ---- */
  .item{padding:8px 0;border-bottom:1px solid var(--rule-thin);}
  .item .line{display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .item .nm{font-size:16px;font-weight:500;line-height:1.25}
  .item .sub{font-size:13px;color:var(--dim);line-height:1.3}
  .item .wt{font-size:13px;color:var(--dim);white-space:nowrap}
  .item .wt.est{color:var(--est)}
  .item .line.meta{margin-top:1px;align-items:baseline}

  /* expandable parent + children */
  .item.has-children .row{cursor:pointer;}
  .item.has-children .row:active{opacity:.55;}
  .item.has-children .row:focus-visible{outline:2px solid #fff;outline-offset:3px;border-radius:3px;}
  .chev{
    flex:none;width:16px;height:16px;color:var(--dim);
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s ease;
  }
  .chev svg{width:16px;height:16px;display:block;}
  .item.open .chev{transform:rotate(180deg);}
  .children{display:none;margin:8px 0 0 10px;padding-left:16px;border-left:2px solid var(--rule-mid);}
  .item.open .children{display:block;}
  .child{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:8px 0;}
  .child .nm{font-size:16px;font-weight:500;color:var(--fg);line-height:1.25}
  .child .wt{font-size:13px;color:var(--dim);white-space:nowrap}
  .child .wt.est{color:var(--est)}
</style>
</head>
<body>
  <main class="wrap">

      <div class="units" id="units" role="group" aria-label="Weight unit"></div>
    </header>
    <div class="boxes" id="boxes"></div>

   - grams: weight of ONE unit. null = unknown (renders "x").

   - consumable:true: food / water / fuel. Excluded from base weight.
   - children:[ {nm, grams, est?}, ... ]: makes the row an EXPANDABLE
            group. Omit the parent's grams — its weight is the sum of the
            children. The parent inherits its own category + consumable
            flag for the whole group. Good for kits: first aid, snacks,
            tent components, repair kit, toiletry bag, etc.
   - est:true: marks a weight as an estimate (renders red). Works on

   Weight classes (all computed, never edit a total by hand):
     • Worn / carried = every item in the "Worn" category (on body, in hand)
     • Consumables    = items flagged consumable:true

/* ---- formatting ---- */
const G_PER_LB = 453.59237;
const G_PER_OZ = 28.349523;

const state = { unit: "g" };
const UNITS = [
  { key:"g",  label:"gr" },
  { key:"oz", label:"oz" },
  { key:"lb", label:"lb" },
];

const CHEVRON = '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function fmt(g){
  if(g == null) return "x";
  if(state.unit === "oz") return (g / G_PER_OZ).toFixed(1) + "oz";
  if(state.unit === "lb") return (g / G_PER_LB).toFixed(2) + "lb";
  return Math.round(g).toLocaleString() + "g";
}

function el(tag, cls, txt){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(txt != null) e.textContent = txt;
  return e;
}

/* sum of one item: children if present, else grams x count */
function itemWeight(it){
  if(it.children) return it.children.reduce((s,c) => s + (c.grams != null ? c.grams * (c.count||1) : 0), 0);
  return it.grams != null ? it.grams * (it.count||1) : 0;
}

/* ---- build tabs + unit toggle once ---- */
const tabsEl = document.getElementById("tabs");
PEOPLE.forEach(p => {
  const b = el("button","tab",p.label);
  b.id = "tab-" + p.key;
  b.setAttribute("role","tab");
  b.addEventListener("click", () => { location.hash = p.key; });
  tabsEl.appendChild(b);
});

const unitsEl = document.getElementById("units");
UNITS.forEach(u => {
  const b = el("button","unit",u.label);
  b.id = "unit-" + u.key;
  b.addEventListener("click", () => { state.unit = u.key; render(currentKey()); });
  unitsEl.appendChild(b);
});

/* remembers which groups are expanded, keyed person/cat/name */
const expanded = new Set();

/* ---- render a dataset ---- */
function render(key){
  const person = PEOPLE.find(p => p.key === key) || PEOPLE[0];
  const data = DATASETS[person.key];

  PEOPLE.forEach(p => {
    const t = document.getElementById("tab-" + p.key);
    const on = p.key === person.key;
    t.classList.toggle("active", on);
    t.setAttribute("aria-selected", on ? "true" : "false");
  });
  UNITS.forEach(u => {
    const b = document.getElementById("unit-" + u.key);
    const on = u.key === state.unit;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });

  const list = document.getElementById("list");
  list.innerHTML = "";
  let total = 0, worn = 0, consumable = 0;

  data.forEach(group => {
    const section = el("section","cat");
    const isWorn = group.cat === "Worn";
    let catTotal = 0;

    const head = el("div","cat-head");
    head.appendChild(el("span","name", group.cat));
    const catTotalEl = el("span","total");
    head.appendChild(catTotalEl);
    section.appendChild(head);
    section.appendChild(el("div","cat-rule"));

    group.items.forEach(it => {
      const w = itemWeight(it);
      catTotal += w; total += w;
      if(isWorn) worn += w;
      else if(it.consumable) consumable += w;

      const hasKids = !!it.children;
      const key2 = person.key + "/" + group.cat + "/" + it.nm;
      const open = hasKids && expanded.has(key2);

      const item = el("div","item" + (hasKids ? " has-children" : "") + (open ? " open" : ""));
      const nmText = it.nm + ((it.count||1) > 1 ? "  \u00d7" + it.count : "");

      const row = el("div","row");
      const l1 = el("div","line");
      l1.appendChild(el("span","nm", nmText));
      if(hasKids){
        const chev = el("span","chev");
        chev.innerHTML = CHEVRON;
        l1.appendChild(chev);
      }
      const l2 = el("div","line meta");
      l2.appendChild(el("span","sub", it.sub || ""));
      const wt = el("span","wt", fmt(hasKids ? w : it.grams));
      if(it.est) wt.classList.add("est");
      l2.appendChild(wt);
      row.appendChild(l1); row.appendChild(l2);
      item.appendChild(row);

      if(hasKids){
        row.setAttribute("role","button");
        row.setAttribute("tabindex","0");
        row.setAttribute("aria-expanded", open ? "true" : "false");

        const kids = el("div","children");
        it.children.forEach(c => {
          const crow = el("div","child");
          crow.appendChild(el("span","nm", c.nm));
          const cw = el("span","wt", fmt(c.grams != null ? c.grams * (c.count||1) : null));
          if(c.est) cw.classList.add("est");
          crow.appendChild(cw);
          kids.appendChild(crow);
        });
        item.appendChild(kids);

        const toggle = () => {
          const nowOpen = item.classList.toggle("open");
          row.setAttribute("aria-expanded", nowOpen ? "true" : "false");
          if(nowOpen) expanded.add(key2); else expanded.delete(key2);
        };
        row.addEventListener("click", toggle);
        row.addEventListener("keydown", e => {
          if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggle(); }
        });
      }

      section.appendChild(item);
    });

    catTotalEl.textContent = catTotal > 0 ? fmt(catTotal) : "(Total Weight)";
    list.appendChild(section);
  });

  const base = total - worn - consumable;
  const boxesEl = document.getElementById("boxes");
  boxesEl.innerHTML = "";
  [
    ["Total", total],
    ["Base", base],
    ["Consum.", consumable],
    ["Worn", worn],
  ].forEach(([k, v]) => {
    const box = el("div","box");
    box.appendChild(el("span","v", fmt(v)));
    box.appendChild(el("span","k", k));
    boxesEl.appendChild(box);
  });

  document.title = person.label + " — Gear";
}

function currentKey(){
  const h = (location.hash || "").replace("#","");
  return PEOPLE.some(p => p.key === h) ? h : PEOPLE[0].key;
}
window.addEventListener("hashchange", () => render(currentKey()));
render(currentKey());
</script>
