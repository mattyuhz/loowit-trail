<head>
<meta charset="UTF-8">

<title>Gear</title>
<style>
  :root{
    --bg:#000;
    --fg:#fff;
    --dim:rgba(255,255,255,.6);
    --rule-heavy:rgba(217,217,217,.32);
    --rule-mid:rgba(217,217,217,.16);
    --rule-thin:rgba(217,217,217,.08);
    --pad:16px;
    --maxw:412px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);}
  body{
    color:var(--fg);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--pad) 64px;}

  /* ---- tab bar ---- */
  .tabs{
    display:flex;gap:24px;
    padding:18px 0 0;
    border-bottom:1px solid var(--rule-thin);
  }
  .tab{
    appearance:none;background:none;border:none;cursor:pointer;
    font-family:inherit;font-size:16px;font-weight:500;letter-spacing:.2px;
    color:var(--dim);
    padding:0 0 10px;
    margin-bottom:-1px;
    border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--fg);border-bottom-color:var(--fg);}
  .tab:focus-visible{outline:2px solid #fff;outline-offset:3px;border-radius:2px;}

  /* ---- title row ---- */
  .title{
    display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:15px 0 12px;
  }
  .title .name{font-size:17px;font-weight:500;letter-spacing:.2px}
  .title .total{font-size:17px;font-weight:500;color:var(--fg);white-space:nowrap}

  /* ---- category ---- */
  .cat{border-top:3px solid var(--rule-heavy);}
  .cat-head{
    display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:13px 0;
  }
  .cat-head .name{font-size:17px;font-weight:500}
  .cat-head .total{font-size:17px;font-weight:500;color:var(--fg);white-space:nowrap}
  .cat-rule{height:2px;background:var(--rule-mid)}

  /* ---- item ---- */
  .item{padding:11px 0;border-bottom:1px solid var(--rule-thin);}
  .item .line{display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .item .nm{font-size:16px;font-weight:500;line-height:1.25}
  .item .ct{font-size:16px;font-weight:400;color:var(--fg);white-space:nowrap}
  .item .sub{font-size:13px;color:var(--dim);line-height:1.3}
  .item .wt{font-size:13px;color:var(--dim);white-space:nowrap}
  .item .line.meta{margin-top:3px}
</style>
</head>
<body>
  <main class="wrap">
    <nav class="tabs" id="tabs" role="tablist" aria-label="Whose gear"></nav>
    <div class="title"><span class="name" id="who"></span><span class="total" id="grand"></span></div>
    <div id="list"></div>
  </main>

/* ---- formatting ---- */
const G_PER_LB = 453.59237;
const G_PER_OZ = 28.349523;

function fmtWeight(g){
  if(g == null) return "x";
  const grams = Math.round(g);
  const lb = (g / G_PER_LB).toFixed(2);
  const oz = (g / G_PER_OZ).toFixed(1);
  return grams.toLocaleString() + "g / " + lb + "lb / " + oz + "oz";
}

function el(tag, cls, txt){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(txt != null) e.textContent = txt;
  return e;
}

/* ---- build tabs once ---- */
const tabsEl = document.getElementById("tabs");
PEOPLE.forEach(p => {
  const b = el("button","tab",p.label);
  b.id = "tab-" + p.key;
  b.setAttribute("role","tab");
  b.addEventListener("click", () => { location.hash = p.key; });
  tabsEl.appendChild(b);
});

/* ---- render a dataset ---- */
function render(key){
  const person = PEOPLE.find(p => p.key === key) || PEOPLE[0];
  const data = DATASETS[person.key];

  PEOPLE.forEach(p => {
    const t = document.getElementById("tab-" + p.key);
    const on = p.key === person.key;
    t.classList.toggle("active", on);
    t.setAttribute("aria-selected", on ? "true" : "false");
  });

  document.getElementById("who").textContent = person.label;

  const list = document.getElementById("list");
  list.innerHTML = "";
  let grand = 0;

  data.forEach(group => {
    const section = el("section","cat");
    let catTotal = 0;

    const head = el("div","cat-head");
    head.appendChild(el("span","name", group.cat));
    const catTotalEl = el("span","total");
    head.appendChild(catTotalEl);
    section.appendChild(head);
    section.appendChild(el("div","cat-rule"));

    group.items.forEach(it => {
      const count = it.count || 1;
      if(it.grams != null){ catTotal += it.grams * count; grand += it.grams * count; }
      const item = el("div","item");
      const l1 = el("div","line");
      l1.appendChild(el("span","nm", it.nm));
      l1.appendChild(el("span","ct", "(" + count + ")"));
      const l2 = el("div","line meta");
      l2.appendChild(el("span","sub", it.sub || ""));
      l2.appendChild(el("span","wt", fmtWeight(it.grams)));
      item.appendChild(l1); item.appendChild(l2);
      section.appendChild(item);
    });

    catTotalEl.textContent = catTotal > 0 ? fmtWeight(catTotal) : "(Total Weight)";
    list.appendChild(section);
  });

  document.getElementById("grand").textContent = fmtWeight(grand);
  document.title = person.label + " — Gear";
}

function currentKey(){
  const h = (location.hash || "").replace("#","");
  return PEOPLE.some(p => p.key === h) ? h : PEOPLE[0].key;
}
window.addEventListener("hashchange", () => render(currentKey()));
render(currentKey());
