<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gear</title>
<style>
  :root{
    --bg:#000;
    --fg:#fff;
    --dim:rgba(255,255,255,.64);
    --faint:rgba(255,255,255,.32);
    --est:#ff6b6b;
    --rule-heavy:rgba(217,217,217,.32);
    --rule-mid:rgba(217,217,217,.16);
    --rule-thin:rgba(217,217,217,.08);
    --pad:16px;
    --maxw:412px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);}
  body{
    color:var(--fg);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--pad) 64px;}

  /* ---- top bar ---- */
  .topbar{
    display:flex;justify-content:space-between;align-items:center;gap:12px;
    padding:14px 0 0;
    border-bottom:1px solid var(--rule-thin);
  }
  .tabs{display:flex;gap:24px;}
  .tab{
    appearance:none;background:none;border:none;cursor:pointer;
    font-family:inherit;font-size:16px;font-weight:500;letter-spacing:.2px;
    color:var(--faint);
    padding:0 0 12px;margin-bottom:-1px;
    border-bottom:2px solid transparent;
  }
  .tab.active{color:var(--fg);border-bottom-color:var(--fg);}
  .tab:focus-visible{outline:2px solid #fff;outline-offset:3px;border-radius:2px;}

  /* unit toggle */
  .units{display:flex;gap:4px;padding-bottom:9px;}
  .unit{
    appearance:none;border:none;cursor:pointer;font-family:inherit;
    font-size:12px;font-weight:400;color:var(--dim);
    background:rgba(255,255,255,.06);
    height:24px;padding:0 11px;border-radius:12px;
    display:flex;align-items:center;
  }
  .unit.active{background:#fff;color:#000;}
  .unit:focus-visible{outline:2px solid #fff;outline-offset:2px;}

  /* ---- 4 summary boxes ---- */
  .boxes{display:flex;gap:4px;padding:16px 0 18px;}
  .box{
    flex:1;min-width:0;
    background:rgba(255,255,255,.06);
    border-radius:16px;padding:11px 12px;height:55px;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .box .v{font-size:16px;font-weight:500;white-space:nowrap;letter-spacing:-.1px;}
  .box .k{font-size:11px;color:var(--dim);white-space:nowrap;}

  /* ---- category ---- */
  .cat{border-top:4px solid var(--rule-heavy);}
  .cat-head{
    display:flex;justify-content:space-between;align-items:baseline;gap:12px;
    padding:12px 0;
  }
  .cat-head .name{font-size:17px;font-weight:500}
  .cat-head .total{font-size:15px;font-weight:400;color:var(--dim);white-space:nowrap}
  .cat-rule{height:2px;background:var(--rule-mid)}
  .subgroup{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.5);margin:15px 0 4px;padding-left:1px}
  .subgroup:first-of-type{margin-top:8px}
  .closet-person{font-size:20px;font-weight:600;letter-spacing:-.3px;margin:24px 0 0;padding-top:10px;border-top:1px solid var(--rule-mid);}
  .closet-person.first{margin-top:6px;border-top:none;padding-top:0;}
  .trip-badge{flex:none;background:rgba(255,255,255,.16);color:var(--fg);font-size:11px;font-weight:500;line-height:1;padding:2.5px 8px;border-radius:8px;white-space:nowrap;}

  /* ---- item ---- */
  .item{padding:8px 0;border-bottom:1px solid var(--rule-thin);}
  .item .line{display:flex;justify-content:space-between;align-items:center;gap:12px;}
  .item .nm{font-size:16px;font-weight:500;line-height:1.25}
  .name-wrap{display:inline-flex;align-items:center;gap:8px;min-width:0;}
  .worn-badge{
    flex:none;background:#fff;color:#000;
    font-size:11px;font-weight:500;line-height:1;
    padding:2.5px 8px;border-radius:8px;white-space:nowrap;
  }
  .item .sub{font-size:13px;color:var(--dim);line-height:1.3}
  .item .wt{font-size:13px;color:var(--dim);white-space:nowrap}
  .item .wt.est{color:var(--dim)}
  .item .wt.est::after{content:"*";margin-left:1px}
  .item .line.meta{margin-top:1px;align-items:baseline}

  /* expandable parent + children */
  .item.has-children .row{cursor:pointer;}
  .item.has-children .row:active{opacity:.55;}
  .item.has-children .row:focus-visible{outline:2px solid #fff;outline-offset:3px;border-radius:3px;}
  .chev{
    flex:none;width:16px;height:16px;color:var(--dim);
    display:flex;align-items:center;justify-content:center;
    transition:transform .2s ease;
  }
  .chev svg{width:16px;height:16px;display:block;}
  .item.open .chev{transform:rotate(180deg);}
  .children{display:none;margin:8px 0 0 10px;padding-left:16px;border-left:2px solid var(--rule-mid);}
  .item.open .children{display:block;}
  .row{display:flex;align-items:center;gap:12px;}
  .row-content{flex:1;min-width:0;}
  .child{display:flex;align-items:center;gap:8px;padding:8px 0;}
  .child .nm{font-size:16px;font-weight:500;color:var(--fg);line-height:1.25}
  .child .wt{font-size:13px;color:var(--dim);white-space:nowrap}
  .child .wt.est{color:var(--dim)}
  .child .wt.est::after{content:"*";margin-left:1px}

  /* ---- quantity badge + stepper ---- */
  .qty{flex:none;display:flex;align-items:center;justify-content:center;min-width:24px;}
  .qty-badge{
    width:24px;height:31px;border-radius:12px;
    background:rgba(255,255,255,.06);color:var(--fg);
    font-size:13px;font-weight:500;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;user-select:none;-webkit-user-select:none;
  }
  .qty-badge.sm{width:22px;height:28px;border-radius:11px;font-size:12px;}
  .qty-badge:active{opacity:.6;}
  .qty-badge:focus-visible{outline:2px solid #fff;outline-offset:2px;}
  .qty-step{
    flex:none;display:flex;align-items:center;
    background:rgba(255,255,255,.06);border-radius:15.5px;height:31px;
  }
  .qty-step button{
    appearance:none;border:none;background:none;cursor:pointer;
    color:var(--fg);font-size:18px;line-height:1;padding:0;
    width:26px;height:31px;display:flex;align-items:center;justify-content:center;
  }
  .qty-step button:active{opacity:.5;}
  .qty-step button:disabled{opacity:.3;cursor:default;}
  .qty-step .n{min-width:18px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;}
  .qty-step.sm{height:28px;border-radius:14px;}
  .qty-step.sm button{height:28px;width:22px;font-size:16px;}
</style>

      <div class="units" id="units" role="group" aria-label="Weight unit"></div>

   - grams: weight of ONE unit. null = unknown (renders "x").

   - consumable:true: food / water / fuel. Excluded from base weight.
   - children:[ {nm, grams, est?}, ... ]: makes the row an EXPANDABLE
            group. Omit the parent's grams — its weight is the sum of the
            children. The parent inherits its own category + consumable
            flag for the whole group. Good for kits: first aid, snacks,
            tent components, repair kit, toiletry bag, etc.
   - est:true: marks a weight as an estimate (renders red). Works on
            items and on individual children.
   Weight classes (all computed, never edit a total by hand):
     • Worn / carried = every item in the "Worn" category (on body, in hand)
     • Consumables    = items flagged consumable:true
     • Base           = everything else (what's in the pack, minus consumables)
     • Total          = base + worn + consumables
   Unit toggle (GR/oz/lb) is display-only; always store grams.
   ===================================================================== */

/* ---- formatting ---- */
const G_PER_LB = 453.59237;
const G_PER_OZ = 28.349523;

const state = { unit: "lb" };
const UNITS = [
  { key:"g",  label:"gr" },
  { key:"oz", label:"oz" },
  { key:"lb", label:"lb" },
];

const CHEVRON = '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function fmt(g){
  if(g == null) return "x";
  if(state.unit === "oz") return (g / G_PER_OZ).toFixed(1) + "oz";
  if(state.unit === "lb") return (g / G_PER_LB).toFixed(2) + "lb";
  return Math.round(g).toLocaleString() + "g";
}

function el(tag, cls, txt){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(txt != null) e.textContent = txt;
  return e;
}

/* food: append "~N kcal" to a description when calories are known (kc = total for the line) */
function subWithKcal(sub, kc){
  if(kc > 0) return (sub ? sub + " \u00b7 " : "") + "~" + Math.round(kc).toLocaleString() + " kcal";
  return sub || "";
}

/* remembers which groups are expanded, keyed person/cat/name */
const expanded = new Set();

/* ---- session-only quantity overrides (reset on refresh) ---- */
const counts = {};            /* key -> overridden count */
let openStep = null;          /* key of the item whose stepper is open (one at a time) */
function getCount(key, base){
  return counts[key] != null ? counts[key] : (base || 1);
}
function setCount(key, base, delta){
  const next = Math.max(1, getCount(key, base) + delta);
  if(next === (base || 1)) delete counts[key]; else counts[key] = next;
}
function qtyControl(key, base, isOpen, small){
  const cnt = getCount(key, base);
  const changed = cnt !== (base || 1);
  if(!isOpen){
    const b = el("span", "qty-badge" + (small ? " sm" : "") + (changed ? " changed" : ""), String(cnt));
    b.setAttribute("role","button");
    b.setAttribute("tabindex","0");
    b.setAttribute("aria-label","Quantity " + cnt + ", change");
    const openIt = e => { e.stopPropagation(); openStep = key; render(currentKey()); };
    b.addEventListener("click", openIt);
    b.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); openIt(e); } });
    return b;
  }
  const wrap = el("span", "qty-step" + (small ? " sm" : "") + (changed ? " changed" : ""));
  const minus = el("button", null, "\u2212");
  minus.disabled = cnt <= 1;
  minus.setAttribute("aria-label","Decrease quantity");
  minus.addEventListener("click", e => { e.stopPropagation(); setCount(key, base, -1); render(currentKey()); });
  const n = el("span","n", String(cnt));
  n.setAttribute("role","button");
  n.setAttribute("tabindex","0");
  n.setAttribute("aria-label","Quantity " + cnt + ", done");
  const closeIt = e => { e.stopPropagation(); openStep = null; render(currentKey()); };
  n.addEventListener("click", closeIt);
  n.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); closeIt(e); } });
  const plus = el("button", null, "+");
  plus.setAttribute("aria-label","Increase quantity");
  plus.addEventListener("click", e => { e.stopPropagation(); setCount(key, base, 1); render(currentKey()); });
  wrap.appendChild(minus);
  wrap.appendChild(n);
  wrap.appendChild(plus);
  return wrap;
}

/* ---- render a dataset ---- */
function render(key){
  if(key === "closet"){ renderCloset(); return; }
  const person = PEOPLE.find(p => p.key === key) || PEOPLE[0];
  const data = DATASETS[person.key];

  const ctab = document.getElementById("tab-closet");
  if(ctab){ ctab.classList.remove("active"); ctab.setAttribute("aria-selected","false"); }

  PEOPLE.forEach(p => {
    const t = document.getElementById("tab-" + p.key);
    const on = p.key === person.key;
    t.classList.toggle("active", on);
    t.setAttribute("aria-selected", on ? "true" : "false");
  });
  UNITS.forEach(u => {
    const b = document.getElementById("unit-" + u.key);
    const on = u.key === state.unit;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });

  const list = document.getElementById("list");
  list.innerHTML = "";
  let total = 0, worn = 0, consumable = 0;

  data.forEach((group, gi) => {
    const section = el("section","cat");
    let catTotal = 0;

    const head = el("div","cat-head");
    head.appendChild(el("span","name", group.cat));
    const catTotalEl = el("span","total");
    head.appendChild(catTotalEl);
    section.appendChild(head);
    section.appendChild(el("div","cat-rule"));

    let prevGroup = null;
    group.items.forEach((it, ii) => {
      if(it.group && it.group !== prevGroup){
        section.appendChild(el("div","subgroup", it.group));
        prevGroup = it.group;
      }
      const hasKids = !!it.children;
      const itemKey = person.key + ":" + gi + ":" + ii;

      let w = 0, kc = 0;
      if(hasKids){
        it.children.forEach((c, ci) => {
          const cCount = getCount(itemKey + ":" + ci, c.count);
          if(c.grams != null) w += c.grams * cCount;
          if(c.kcal != null) kc += c.kcal * cCount;
        });
      } else {
        const cnt = getCount(itemKey, it.count);
        w = it.grams != null ? it.grams * cnt : 0;
        kc = it.kcal != null ? it.kcal * cnt : 0;
      }
      catTotal += w; total += w;
      if(it.worn) worn += w;
      else if(it.consumable) consumable += w;

      const expKey = person.key + "/" + group.cat + "/" + it.nm;
      const open = hasKids && expanded.has(expKey);

      const item = el("div","item" + (hasKids ? " has-children" : "") + (open ? " open" : ""));

      const row = el("div","row");
      const qty = el("span","qty");
      if(hasKids){
        const chev = el("span","chev");
        chev.innerHTML = CHEVRON;
        qty.appendChild(chev);
      } else {
        qty.appendChild(qtyControl(itemKey, it.count, openStep === itemKey, false));
      }
      row.appendChild(qty);

      const content = el("div","row-content");
      const l1 = el("div","line");
      const nameWrap = el("span","name-wrap");
      nameWrap.appendChild(el("span","nm", it.nm));
      if(it.worn) nameWrap.appendChild(el("span","worn-badge", "Worn"));
      l1.appendChild(nameWrap);
      const l2 = el("div","line meta");
      l2.appendChild(el("span","sub", subWithKcal(it.sub, kc)));
      const itemWt = hasKids ? w : (it.grams != null ? w : null);
      const wt = el("span","wt", fmt(itemWt));
      if(it.est || itemWt == null) wt.classList.add("est");
      l2.appendChild(wt);
      content.appendChild(l1); content.appendChild(l2);
      row.appendChild(content);
      item.appendChild(row);

      if(hasKids){
        row.setAttribute("role","button");
        row.setAttribute("tabindex","0");
        row.setAttribute("aria-expanded", open ? "true" : "false");

        const kids = el("div","children");
        it.children.forEach((c, ci) => {
          const childKey = itemKey + ":" + ci;
          const cCount = getCount(childKey, c.count);
          const cWt = c.grams != null ? c.grams * cCount : null;
          const cKc = c.kcal != null ? c.kcal * cCount : 0;

          const crow = el("div","child");
          const cQty = el("span","qty");
          cQty.appendChild(qtyControl(childKey, c.count, openStep === childKey, true));
          crow.appendChild(cQty);

          const cmain = el("div","row-content");
          if(c.sub){
            const cl1 = el("div","line");
            cl1.appendChild(el("span","nm", c.nm));
            cmain.appendChild(cl1);
            const cl2 = el("div","line meta");
            cl2.appendChild(el("span","sub", subWithKcal(c.sub, cKc)));
            const cw = el("span","wt", fmt(cWt));
            if(c.est || cWt == null) cw.classList.add("est");
            cl2.appendChild(cw);
            cmain.appendChild(cl2);
          } else {
            const cl = el("div","line");
            cl.appendChild(el("span","nm", c.nm));
            const cw = el("span","wt", fmt(cWt));
            if(c.est || cWt == null) cw.classList.add("est");
            cl.appendChild(cw);
            cmain.appendChild(cl);
          }
          crow.appendChild(cmain);
          kids.appendChild(crow);
        });
        item.appendChild(kids);

        const toggle = () => {
          const nowOpen = item.classList.toggle("open");
          row.setAttribute("aria-expanded", nowOpen ? "true" : "false");
          if(nowOpen) expanded.add(expKey); else expanded.delete(expKey);
        };
        row.addEventListener("click", toggle);
        row.addEventListener("keydown", e => {
          if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggle(); }
        });
      }

      section.appendChild(item);
    });

    catTotalEl.textContent = catTotal > 0 ? fmt(catTotal) : "(Total Weight)";
    list.appendChild(section);
  });

  const base = total - worn - consumable;
  const boxesEl = document.getElementById("boxes");
  boxesEl.innerHTML = "";
  [
    ["Total", total],
    ["Base", base],
    ["Consum.", consumable],
    ["Worn", worn],
  ].forEach(([k, v]) => {
    const box = el("div","box");
    box.appendChild(el("span","v", fmt(v)));
    box.appendChild(el("span","k", k));
    boxesEl.appendChild(box);
  });

  document.title = person.label + " — Gear";
}

/* sum a closet item: parts if present, else its own grams (null -> 0) */
function closetWeight(it){
  if(it.parts) return it.parts.reduce((s,p) => s + (p.grams != null ? p.grams : 0), 0);
  return it.grams != null ? it.grams : 0;
}

function renderCloset(){
  PEOPLE.forEach(p => {
    const t = document.getElementById("tab-" + p.key);
    t.classList.remove("active");
    t.setAttribute("aria-selected","false");
  });
  const ct = document.getElementById("tab-closet");
  if(ct){ ct.classList.add("active"); ct.setAttribute("aria-selected","true"); }
  UNITS.forEach(u => {
    const b = document.getElementById("unit-" + u.key);
    const on = u.key === state.unit;
    b.classList.toggle("active", on);
    b.setAttribute("aria-pressed", on ? "true" : "false");
  });

  const owners = [...PEOPLE, { key:"shared", label:"Shared" }];

  const list = document.getElementById("list");
  list.innerHTML = "";

  const boxesEl = document.getElementById("boxes");
  boxesEl.innerHTML = "";
  owners.forEach(o => {
    const groups = CLOSET[o.key];
    if(!groups) return;
    let w = 0;
    groups.forEach(g => g.items.forEach(it => { w += closetWeight(it); }));
    const box = el("div","box");
    box.appendChild(el("span","v", fmt(w)));
    box.appendChild(el("span","k", o.label + " closet"));
    boxesEl.appendChild(box);
  });

  let firstPerson = true;
  owners.forEach(o => {
    const groups = CLOSET[o.key];
    if(!groups) return;
    const ph = el("div","closet-person" + (firstPerson ? " first" : ""), o.label);
    list.appendChild(ph);
    firstPerson = false;

    groups.forEach(group => {
      const section = el("section","cat");
      let catTotal = 0;
      group.items.forEach(it => { catTotal += closetWeight(it); });

      const head = el("div","cat-head");
      head.appendChild(el("span","name", group.cat));
      head.appendChild(el("span","total", catTotal > 0 ? fmt(catTotal) : ""));
      section.appendChild(head);
      section.appendChild(el("div","cat-rule"));

      group.items.forEach(it => {
        const desc = [it.size, it.color].filter(Boolean).join(" \u00b7 ");

        if(it.parts){
          const w = closetWeight(it);
          const expKey = "closet/" + o.key + "/" + group.cat + "/" + it.nm + "/" + (it.color || "");
          const open = expanded.has(expKey);
          const item = el("div","item has-children" + (open ? " open" : ""));

          const row = el("div","row");
          row.setAttribute("role","button");
          row.setAttribute("tabindex","0");
          row.setAttribute("aria-expanded", open ? "true" : "false");
          const content = el("div","row-content");
          const l1 = el("div","line");
          const nameWrap = el("span","name-wrap");
          nameWrap.appendChild(el("span","nm", it.nm));
          if(it.loowit) nameWrap.appendChild(el("span","trip-badge","Loowit"));
          l1.appendChild(nameWrap);
          const chev = el("span","chev");
          chev.innerHTML = CHEVRON;
          l1.appendChild(chev);
          const l2 = el("div","line meta");
          l2.appendChild(el("span","sub", desc));
          l2.appendChild(el("span","wt", fmt(w)));
          content.appendChild(l1); content.appendChild(l2);
          row.appendChild(content);
          item.appendChild(row);

          const kids = el("div","children");
          it.parts.forEach(pt => {
            const crow = el("div","child");
            const cmain = el("div","row-content");
            const cl = el("div","line");
            cl.appendChild(el("span","nm", pt.nm));
            const cw = el("span","wt", fmt(pt.grams));
            if(pt.grams == null) cw.classList.add("est");
            cl.appendChild(cw);
            cmain.appendChild(cl);
            crow.appendChild(cmain);
            kids.appendChild(crow);
          });
          item.appendChild(kids);

          const toggle = () => {
            const nowOpen = item.classList.toggle("open");
            row.setAttribute("aria-expanded", nowOpen ? "true" : "false");
            if(nowOpen) expanded.add(expKey); else expanded.delete(expKey);
          };
          row.addEventListener("click", toggle);
          row.addEventListener("keydown", e => {
            if(e.key === "Enter" || e.key === " "){ e.preventDefault(); toggle(); }
          });

          section.appendChild(item);
        } else {
          const item = el("div","item");
          const l1 = el("div","line");
          const nameWrap = el("span","name-wrap");
          nameWrap.appendChild(el("span","nm", it.nm));
          if(it.loowit) nameWrap.appendChild(el("span","trip-badge","Loowit"));
          l1.appendChild(nameWrap);
          const l2 = el("div","line meta");
          l2.appendChild(el("span","sub", desc));
          l2.appendChild(el("span","wt", fmt(it.grams)));
          item.appendChild(l1);
          item.appendChild(l2);
          section.appendChild(item);
        }
      });
      list.appendChild(section);
    });
  });

  document.title = "Closet \u2014 Gear";
}

function currentKey(){
  const h = (location.hash || "").replace("#","");
  if(h === "closet") return "closet";
  return PEOPLE.some(p => p.key === h) ? h : PEOPLE[0].key;
}
window.addEventListener("hashchange", () => render(currentKey()));
render(currentKey());
</script>
</body>
</html>
